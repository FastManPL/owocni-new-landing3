<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetyczna Opowieść</title>
    
    <!-- Google Fonts: Lexend (Variable) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- GSAP via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        /* ============================================
           FAZA 1.1: Zmienne CSS (scoped do sekcji)
           ============================================ */
        #kinetic-section {
            /* ORYGINALNE - bez zmian */
            --bg-color: #f7f6f4;
            --text-color: #141414; 
            --highlight-color: #141414;
            
            /* NOWE - kolory blobów (initial: pale blue/cool) */
            --blob-1-color: hsl(200, 35%, 88%);
            --blob-2-color: hsl(240, 25%, 90%);
            --blob-3-color: hsl(180, 30%, 92%);
            
            /* Pomocnicza warstwa podglądu tła */
            --blob-bg-preview: hsl(210, 30%, 94%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f7f6f4; /* was var(--bg-color) — vars scoped to #kinetic-section */
            color: #141414; /* was var(--text-color) */
            font-family: 'Lexend', sans-serif;
            overflow-x: hidden;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        body::-webkit-scrollbar { 
            display: none; 
        }

        #kinetic-section {
            height: 100vh;
            height: 100lvh; /* Pin spacer musi być >= lvh, inaczej progress nie dojdzie do 1.0 */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: visible; /* TEST: zmienione z hidden dla kontekstu 3D */
            z-index: 1;
        }

        /* STREFA 1: Pinowana - dziedziczy z .stage */
        #kinetic-section {
            background-color: var(--bg-color);
        }

        /* ============================================
           FAZA 1.2 + 1.3: Style blobów
           ============================================ */
        
        /* Kontener blobów - jedzie razem z contentem */
        #kinetic-section .blob-carrier {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* Nad glow (1), pod resztą */
            pointer-events: none;
            overflow: visible;
        }
        
        /* Animowane tło - kontrolowane przez GSAP timeline */
        #kinetic-section .blob-bg-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--blob-bg-preview);
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        
        /* GLOW - ambient light pod słowem "nigdy" */
        #kinetic-section .nigdy-glow {
            position: absolute;
            left: 50%;  /* domyślnie centrum, JS skoryguje */
            top: 50%;
            width: 1458px;
            height: 1094px;
            z-index: 3; /* Nad blobami (2), pod canvasami */
            pointer-events: none;
            opacity: 0; /* Animowane przez GSAP */
            transform: translate(-50%, -50%);
            mix-blend-mode: luminosity;
            background: radial-gradient(
                50% 37% at 50% 50%,
                #ffffff 0%,
                #ffffff 20%,
                #fffffb 25%,
                #fefff9 28%,
                #fffff7 32%,
                #fefdf8 35%,
                #fffcf5 38%,
                #fffaf6 42%,
                #fef9f5 45%,
                #fdf8f5 48%,
                #fbf7f4 51%,
                rgba(250, 246, 243, 0.8) 55%,
                rgba(248, 247, 244, 0.5) 62%,
                rgba(247, 246, 244, 0.2) 72%,
                transparent 88%
            );
        }
        
        /* Mobile: mniejszy glow - 109% z bazowego */
        @media (max-width: 599px) {
            #kinetic-section .nigdy-glow {
                width: 736px;
                height: 559px;
            }
        }
        
        /* ============================================
           TUNNEL CANVAS - obręcze wokół "!"
           Nad blobami (0), pod cząsteczkami (3)
           ============================================ */
        #kinetic-section #kinetic-tunnel-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4; /* Nad glow (3) */
            pointer-events: none;
        }

        /* ============================================
           PARTICLE QMARK CANVAS - "?" z cząsteczek
           Za tekstem (z-index: 10), nad blobami (2)
           ============================================ */
        #kinetic-section #kinetic-particle-qmark-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5; /* Nad tunnel (4), pod cylinder (6) */
            pointer-events: none;
            filter: hue-rotate(0deg) brightness(60%) saturate(10%) contrast(200%);
            mix-blend-mode: color-burn;
        }
        

        /* Pojedynczy blob */
        #kinetic-section .blob {
            position: absolute;
            border-radius: 50%;
            will-change: transform, opacity;
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        #kinetic-section .blob-1 {
            width: 70vw;
            height: 70vw;
            /* Pozycja określa CENTRUM bloba */
            top: 25vh;
            left: 25vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, var(--blob-1-color) 0%, transparent 70%);
            opacity: 0; /* JS kontroluje via gsap.set + timeline */
            transform-origin: center center;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }

        #kinetic-section .blob-2 {
            width: 80vw;
            height: 80vw;
            /* Pozycja określa CENTRUM bloba */
            top: 75vh;
            left: 75vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, var(--blob-2-color) 0%, transparent 70%);
            opacity: 0; /* JS kontroluje via gsap.set + timeline */
            transform-origin: center center;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        #kinetic-section .blob-3 {
            width: 60vw;
            height: 60vw;
            /* Pozycja określa CENTRUM bloba */
            top: 50vh;
            left: 50vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, var(--blob-3-color) 0%, transparent 70%);
            opacity: 0; /* JS kontroluje via gsap.set + timeline */
            transform-origin: center center;
            border-radius: 50% 50% 20% 80% / 25% 80% 20% 75%;
        }

        /* ============================================
           FAZA 1.5: Media queries dla blobów (mobile)
           ============================================ */
        @media (max-width: 768px) {
            #kinetic-section .blob-1 {
                width: 100vw;
                height: 100vw;
                top: 20vh;
                left: 20vw;
            }
            #kinetic-section .blob-2 {
                width: 120vw;
                height: 120vw;
                top: 80vh;
                left: 80vw;
            }
            #kinetic-section .blob-3 {
                width: 80vw;
                height: 80vw;
                top: 50vh;
                left: 50vw;
            }
        }

        /* ============ CYLINDER COMPONENT ============ */
        #kinetic-section #kinetic-cylinder-wrapper {
            position: absolute;
            top: 0; /* Layout stable - offset przez transform y (composite) */
            left: 50%; /* Centrum - pozycja X kontrolowana przez GSAP */
            width: 100%; /* Pełna szerokość - liczby się nie ucinają */
            height: 100%;
            z-index: 6; /* Nad particle (5), pod tekstem (10) */
            pointer-events: none;
            opacity: 0;
            /* Transform kontrolowany przez GSAP */
        }

        #kinetic-section #kinetic-cylinder-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 0;
        }

        /* Fog renderowany bezpośrednio w canvas - nie potrzeba CSS */

        /* FIX: Obcięcie "%" przy viewport 769-1200px (§5.1.3 Konstytucji) */
        @media (min-width: 769px) and (max-width: 1200px) {
            #kinetic-section #kinetic-cylinder-wrapper {
                width: 140%;
            }
        }

        @media (max-width: 768px) {
            #kinetic-section #kinetic-cylinder-wrapper {
                left: 50%;
                width: 160%;
                height: 120%;
                /* Transform kontrolowany przez GSAP */
            }
        }
        /* ============ KONIEC CYLINDER ============ */

        #kinetic-section .content-wrapper {
            position: relative;
            width: 90%;
            max-width: 1200px;
            height: 100vh;
            height: 100lvh; /* Matchuje .stage — pin spacer consistency */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10; /* Nad cylindrem (z-index: 5) i blobami (0) */
        }

        /* --- GLOBALNE STYLE TEKSTU --- */
        #kinetic-section .line {
            font-size: clamp(1.3rem, 2.88vw, 2.52rem);
            line-height: 1.2; 
            font-weight: 300;
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            white-space: normal;
            text-align: center;
        }

        #kinetic-section .line-large {
            font-size: clamp(2.02rem, 4.46vw, 3.96rem);
            line-height: 1.1;
            letter-spacing: -0.02em; 
        }

        #kinetic-section .line-xlarge {
            font-size: clamp(2.77rem, 6.34vw, 5.54rem);
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        #kinetic-section .line-small {
            font-size: clamp(0.97rem, 2.16vw, 1.87rem);
            line-height: 1.25;
        }

        #kinetic-section .bold-line {
            font-weight: 700;
            color: var(--highlight-color);
        }
        
        #kinetic-section .bold-text {
            font-weight: 700;
        }

        #kinetic-section .highlight {
            font-weight: 700;
            color: var(--highlight-color);
            display: inline-block;
        }

        #kinetic-section .small-header {
            font-size: clamp(1rem, 2vw, 1.5rem);
            opacity: 0.7; 
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            font-weight: 400;
        }

        #kinetic-section .text-block {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            will-change: transform, opacity;
            pointer-events: none;
            width: 100%;
            left: 0; /* ZABEZPIECZENIE: Zawsze od lewej krawędzi kontenera */
        }

        /* --- EFEKT HIGHLIGHT NA SŁOWIE "NIGDY" --- */
        /* Nowa struktura z osobnymi warstwami dla blaszki i tekstu */
        #kinetic-section .word-anchor {
            position: relative;
            display: inline-block;
        }

        /* BLASZKA — z-index:1, za tekstem, własny kontekst 3D */
        #kinetic-section .bg-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            perspective: 1000px;
            pointer-events: none;
        }

        #kinetic-section .nigdy-plate {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 120%;
            background: linear-gradient(90deg, rgba(241, 200, 183, 1), rgba(232, 220, 205, 1));
            border-radius: 4px;
            transform-origin: center center;
            will-change: transform, opacity;
        }

        /* TEKST — z-index:2, przed blaszką, własny kontekst 3D */
        #kinetic-section .text-layer {
            position: relative;
            z-index: 2;
            perspective: 1000px;
        }

        #kinetic-section .nigdy-text {
            display: inline-block;
            font-weight: 300;
            transform-origin: center center;
            will-change: transform;
            backface-visibility: hidden;
        }

        /* --- BLOK 1 (INTRO) --- */
        #kinetic-section #kinetic-block-1 {
            top: 36%; 
            transform: translateY(-50%);
        }
        #kinetic-section #kinetic-block-1 .line:not(.bold-line) {
            font-size: clamp(1.56rem, 3.46vw, 3.02rem);
        }

        /* --- BLOK 2 (FLIP) --- */
        #kinetic-section #kinetic-block-2 {
            top: 66%;  /* przesunięte +5% w dół (było 61%) */
            transform: translateY(-50%);
        }
        
        /* Styl dla animowanych liter - Cinema Container Blur + Color Wave */
        #kinetic-section .anim-char {
            display: inline-block;
            will-change: transform, opacity; /* color usunięte - nie jest kompozytowane przez GPU */
        }

        /* --- BLOK 3 (GEMIUS) --- */
        #kinetic-section #kinetic-block-3 {
            top: 50%;
            /* transform: translateY(-50%) - przeniesione do GSAP jako yPercent */
            /* Lewa krawędź tekstu */
            left: 21%;
            width: 68%;
            align-items: flex-start;
            text-align: left;
            z-index: 15; /* Nad cylindrem */
        }
        #kinetic-section #kinetic-block-3 .line {
            justify-content: flex-start;
            text-align: left;
        }
        
        /* Desktop/Mobile switching for block-3 content */
        #kinetic-section .block-3-desktop, #kinetic-section .block-3-mobile { 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #kinetic-section .block-3-mobile { display: none; }

        @media (max-width: 768px) {
            #kinetic-section #kinetic-block-3 { left: 5%; width: 90%; }
        }

        /* ============ MOBILE < 600px ============ */
        @media (max-width: 599px) {
            /* Typografia - skaluje się liniowo z szerokością */
            #kinetic-section .line {
                font-size: 6.6vw; /* +20% z 5.5vw */
            }
            #kinetic-section .line-large {
                font-size: 7.5vw;
            }
            #kinetic-section .line-xlarge {
                font-size: 8.8vw; /* -20% z 11vw */
            }
            #kinetic-section .line-small {
                font-size: 4vw;
            }
            
            /* Bloki tekstowe - stałe marginesy od krawędzi */
            #kinetic-section .text-block {
                padding: 0 5%;
            }
            
            /* Pozycje pionowe bloków — svh = stabilne z paskiem przeglądarki */
            /* +5svh offset w dół (bloki były za wysoko) */
            #kinetic-section #kinetic-block-1 {
                top: calc(115px + 17.8vh);
                top: calc(115px + 17.8svh);
            }
            #kinetic-section #kinetic-block-1 .line:not(.bold-line) {
                font-size: 6.6vw;
            }
            #kinetic-section #kinetic-block-2 {
                top: calc(185px + 26.2vh);
                top: calc(185px + 26.2svh);
            }
            #kinetic-section #kinetic-block-3 {
                top: calc(145px + 21.1vh);
                top: calc(145px + 21.1svh);
                left: 5%;
                width: 90%;
            }
            
            /* Przełączenie na mobile version */
            #kinetic-section .block-3-desktop { display: none; }
            #kinetic-section .block-3-mobile { display: flex; }
        }


        /* ============ DUŻE EKRANY >= 2000px ============ */
        @media (min-width: 2000px) {
            #kinetic-section #kinetic-cylinder-wrapper {
                max-width: 2000px; /* Nie rośnie szerzej */
            }
        }


    </style>
</head>
<body>



    <!-- Panel Cylinder Control -->

    <!-- ============ STREFA 1: PINOWANA ============ -->
    <div class="stage stage-pinned" id="kinetic-section">
        
        <!-- GLOW LAYER - ambient light pod słowem "nigdy" -->
        <div class="nigdy-glow" id="kinetic-nigdy-glow"></div>
        
        <!-- ============================================
             FAZA 2.1: Blob carrier z 3 blobami
             ============================================ -->
        <div class="blob-carrier" id="kinetic-blob-carrier">
            <div class="blob-bg-preview" id="kinetic-blob-bg-preview"></div>
            <div class="blob blob-1" id="kinetic-blob1"></div>
            <div class="blob blob-2" id="kinetic-blob2"></div>
            <div class="blob blob-3" id="kinetic-blob3"></div>
        </div>
        
        <!-- PARTICLE QMARK - "?" z cząsteczek, za tekstem -->
        <canvas id="kinetic-tunnel-canvas"></canvas>
        <canvas id="kinetic-particle-qmark-canvas"></canvas>
        
        <div class="content-wrapper">
            
            <!-- BLOK 1 -->
            <div class="text-block" id="kinetic-block-1">
                <div class="line">W internecie</div>
                <div class="line">jest więcej klientów,</div>
                <div style="height: 0.72rem;"></div>
                <div class="line bold-line line-large">niż Twoja firma jest</div>
                <div class="line bold-line line-large">w stanie obsłużyć.</div>
            </div>

            <!-- BLOK 2 -->
            <div class="text-block" id="kinetic-block-2">
                <div class="line bold-line line-xlarge" id="kinetic-problem-line">W czym problem?</div>
            </div>

            <!-- BLOK 3 -->
            <div class="text-block" id="kinetic-block-3">
                <div class="small-header">Wg badań <span class="highlight">GEMIUS</span>:</div>
                
                <!-- DESKTOP VERSION -->
                <div class="block-3-desktop">
                    <div class="line">98% osób, które odwiedzi</div>
                    <div class="line">stronę polskiej firmy&nbsp;<span class="word-anchor"><span class="bg-layer"><span class="nigdy-plate" id="kinetic-nigdy-plate"></span></span><span class="text-layer"><span class="nigdy-text" id="kinetic-word-nigdy">nigdy</span></span></span></div>
                    <div class="line bold-line">nie stanie się jej klientami.</div>
                </div>
                
                <!-- MOBILE VERSION -->
                <div class="block-3-mobile">
                    <div class="line">98% osób,</div>
                    <div class="line">które odwiedzi</div>
                    <div class="line">stronę polskiej firmy</div>
                    <div class="line"><span class="word-anchor"><span class="bg-layer"><span class="nigdy-plate" id="kinetic-nigdy-plate-mobile"></span></span><span class="text-layer"><span class="nigdy-text" id="kinetic-word-nigdy-mobile">nigdy</span></span></span>&nbsp;<span class="bold-text">nie stanie</span></div>
                    <div class="line bold-line">się jej klientami.</div>
                </div>
            </div>

        </div> <!-- Koniec content-wrapper -->

        <!-- CYLINDER COMPONENT - fog renderowany w canvas -->
        <div id="kinetic-cylinder-wrapper">
            <canvas id="kinetic-cylinder-canvas"></canvas>
        </div>

    </div> <!-- Koniec STREFA 1 -->

    <!-- Timeline ucięty na U:23 (snap3) — Speed Ramp v3: +4U -->

    <script>
    function init(container) {
        const $ = (sel) => container.querySelector(sel);
        const $$ = (sel) => container.querySelectorAll(sel);
        const $id = (id) => container.querySelector('#' + id);

        const cleanups = [];
        const gsapInstances = [];
        const timerIds = [];
        const tickerFns = [];

        gsap.registerPlugin(ScrollTrigger);
        ScrollTrigger.config({ ignoreMobileResize: true });

        // ── IDEMPOTENT INIT: usuń stare piny tej sekcji ──
        try {
            ScrollTrigger.getAll().forEach(function(st) {
                if (!st) return;
                if (st.trigger === container || (st.vars && st.vars.id === "KINETIC_PIN")) {
                    st.kill(true); // true = usuń pin-spacer
                }
            });
        } catch (e) {}

        const _prevFps = gsap.ticker.fps();
        gsap.ticker.fps(30); // CPU optimization: 30fps dla scroll-based animations

        // ── FREEZE FINAL + SNAP-LOCK ─────────────────────────────────
        // freezeFinal: blokuje resize-handlery gdy animacja na końcu (ostatnia klatka)
        // mobileResizeLock: blokuje snap podczas toolbar/resize na touch devices
        let freezeFinal = false;
        const FREEZE_ON  = 0.999;  // histereza: włącz powyżej
        const FREEZE_OFF = 0.995;  // histereza: wyłącz poniżej

        const IS_TOUCH = !!ScrollTrigger.isTouch;

        let mobileResizeLock = false;
        let mobileResizeTimer = null;

        function armMobileResizeLock() {
            if (!IS_TOUCH) return;
            mobileResizeLock = true;
            clearTimeout(mobileResizeTimer);
            mobileResizeTimer = setTimeout(function() { mobileResizeLock = false; }, 250);
        }

        window.addEventListener('resize', armMobileResizeLock, { passive: true });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', armMobileResizeLock, { passive: true });
        }
        cleanups.push(function() {
            window.removeEventListener('resize', armMobileResizeLock);
            if (window.visualViewport) {
                window.visualViewport.removeEventListener('resize', armMobileResizeLock);
            }
            clearTimeout(mobileResizeTimer);
        });

        // ============================================
        // ADAPTIVE DPR SYSTEM - dynamiczne skalowanie jakości
        // Start: 0.75, mierzy FPS, adaptuje 0.5-1.5
        // ============================================
        const adaptiveDPR = {
            cap: 0.75,
            min: 0.5,
            max: 1.5,
            lastTime: performance.now(),
            frameCount: 0,
            avgFPS: 30,
            callbacks: [], // funkcje do wywołania przy zmianie DPR
            
            tick: function() {
                if (document.hidden) { this.lastTime = performance.now(); this.frameCount = 0; return; }
                this.frameCount++;
                const now = performance.now();
                const elapsed = now - this.lastTime;
                
                // Aktualizuj FPS co 500ms
                if (elapsed >= 500) {
                    const currentFPS = (this.frameCount / elapsed) * 1000;
                    this.avgFPS = this.avgFPS * 0.7 + currentFPS * 0.3; // smoothing
                    this.frameCount = 0;
                    this.lastTime = now;
                    
                    const oldCap = this.cap;
                    
                    // Dostosowane progi dla 30fps ticker
                    if (this.avgFPS > 28) {
                        this.cap = Math.min(this.cap + 0.05, this.max);
                    }
                    if (this.avgFPS < 22) {
                        this.cap = Math.max(this.cap - 0.1, this.min);
                    }
                    
                    // Powiadom listenery o zmianie
                    if (oldCap !== this.cap) {
                        for (var i = 0; i < this.callbacks.length; i++) {
                            this.callbacks[i](this.cap);
                        }
                    }
                }
            },
            
            get: function() {
                return Math.min(window.devicePixelRatio || 1, this.cap);
            },
            
            onChange: function(fn) {
                this.callbacks.push(fn);
            }
        };
        
        // Hook do gsap.ticker
        const _tickAdaptiveDPR = function() {
            adaptiveDPR.tick();
        };
        gsap.ticker.add(_tickAdaptiveDPR);
        tickerFns.push(_tickAdaptiveDPR);

        // ============================================
        // FUNKCJE POMOCNICZE - Cinema Container Blur
        // ============================================
        
        /**
         * Dzieli tekst na pojedyncze litery (spany)
         * @param {HTMLElement} element - Element zawierający tekst
         * @returns {NodeList} - Lista spanów z literami
         */
        function splitIntoChars(element) {
            const nodes = Array.from(element.childNodes);
            element.innerHTML = '';
            
            // DocumentFragment — eliminuje DOM thrashing (1 appendChild zamiast N)
            const fragment = document.createDocumentFragment();
            let globalIndex = 0;
            
            nodes.forEach((node) => {
                const isText = node.nodeType === 3; // Text node
                const target = isText ? fragment : node.cloneNode(false); // Clone element without children
                
                [...node.textContent].forEach((char) => {
                    const span = document.createElement('span');
                    span.className = 'anim-char';
                    span.textContent = char === ' ' ? '\u00A0' : char; // Zachowaj spacje
                    span.dataset.index = globalIndex++;
                    target.appendChild(span);
                });
                
                if (!isText) fragment.appendChild(target);
            });
            
            element.appendChild(fragment); // Jeden DOM update
            
            return element.querySelectorAll('.anim-char');
        }
        
        /**
         * Animacja Block 1 z kolorową falą
         * Litery startują niebieskie (#9dd2f6) i przechodzą do czarnego (#141414)
         * Fala koloru przebiega przez litery od lewej do prawej
         * 
         * @param {GSAPTimeline} tl - Główny timeline
         * @param {HTMLElement} b1 - Kontener Block 1
         * @param {NodeList} b1Lines - Linie zwykłe (.line:not(.bold-line))
         * @param {NodeList} b1Bold - Linie bold (.line.bold-line)
         */
        function animateBlock1_ColorWave(tl, b1, b1Lines, b1Bold) {
            
            // ==========================================
            // KROK 1: Przygotuj strukturę
            // ==========================================
            const allLineChars = [];
            
            [...b1Lines, ...b1Bold].forEach(line => {
                const chars = splitIntoChars(line);
                allLineChars.push({ 
                    line, 
                    chars, 
                    isBold: line.classList.contains('bold-line') 
                });
            });
            
            // ==========================================
            // KROK 2: Kolor startowy
            // ==========================================
            allLineChars.forEach(({ chars }) => {
                gsap.set(chars, { color: "#9dd2f6" });  // Niebieski
            });
            
            tl.set(b1, { autoAlpha: 1 });
            
            // ==========================================
            // KROK 3: Pojawianie się - SEKWENCYJNIE (wszystkie 4 linie, stagger 0.5)
            // Linie wchodzą jedna po drugiej bez przerwy między grupami
            // Zmieści się do U:4.5 (0 + 0.5 + 0.5 + 0.5 + 3 = 4.5)
            // ==========================================
            const normalLines = allLineChars.filter(l => !l.isBold).map(l => l.line);
            const boldLines = allLineChars.filter(l => l.isBold).map(l => l.line);
            const allLines = [...normalLines, ...boldLines]; // Wszystkie w kolejności
            
            // Label — pozycje kolorów RELATYWNE do niego
            // Bez tego, spacer bridge przesuwa timeline i kolory lądują w bridge
            tl.addLabel("colorWaveStart");
            
            tl.fromTo(allLines, 
                { y: 60, opacity: 0, scale: 0.95 },
                { y: 0, opacity: 1, scale: 1, duration: 3, stagger: 0.5, ease: "expo.out" }
            );
            
            // ==========================================
            // KROK 4: Fala koloru - pozycje RELATYWNE do colorWaveStart
            // ==========================================
            allLineChars.forEach(({ chars }, index) => {
                const lineStartTime = index * 0.5; // 0, 0.5, 1.0, 1.5
                
                tl.to(chars, {
                    color: "#141414",
                    duration: 2.8,
                    stagger: 0.02,
                    ease: "power2.out"
                }, "colorWaveStart+=" + (lineStartTime + 0.1));
            });
        }
        
        /**
         * ANIMACJA 1B: Cinema Container Blur
         * 
         * Blur na kontenerze (1 element) + litery tylko scale/opacity/y
         * Efekt: kinowe rozmycie wyostrzające się od środka
         * Wydajność: LEKKA (1 blur zamiast 14)
         * 
         * @param {GSAPTimeline} tl - Główny timeline GSAP
         * @param {HTMLElement} b2 - Kontener z tekstem "W czym problem?"
         */

        // ============================================

    // ============ PARTICLE QMARK COMPONENT - "?" z cząsteczek ============
    (function() {
        'use strict';

        // ============================================
        // KONFIGURACJA TIMING - jednostki timeline
        // Zsynchronizowane z pinnedTl
        // ============================================
        const FORM_START   = 0;      // U:0 - start formowania z pierścienia
        const FORM_END     = 3.5;    // U:3.5 - SNAP 1, "!" uformowany
        const ROTATE_START = 3.5;    // U:3.5 - obrót zaczyna się
        const ROTATE_END   = 9.5;    // U:9.5 - SNAP 2, "?" widoczny
        const COLLAPSE_START = 9.5;  // U:9.5 - collapse zaczyna się
        const COLLAPSE_END = 10.80;  // U:10.80 - eksplozja ciepłych kolorów, cząsteczki zniknęły

        // ============================================
        // PALETY KOLORÓW
        // A = niebieska (wykrzyknik, start)
        // B = zielona jasna (znak zapytania) — domyślna
        // C = zielona ciemna (alternatywna)
        // ============================================
        const PALETTE_A = ['#d9e2e9', '#b4ccd9', '#c3c3da', '#cce4e4'];
        const PALETTE_B = ['#d9ebda', '#b2dab2', '#c1dcce', '#cfe2c7'];
        const PALETTE_C = ['#a3bfa3', '#8fb08f', '#7a9c7a', '#698c69', '#577a57', '#9eb59e', '#88a388'];
        
        const ALL_PALETTES = { B: PALETTE_B, C: PALETTE_C };
        let activePaletteKey = 'B';

        // ============================================
        // STAŁE FIZYKI / RENDERINGU
        // ============================================
        const FOCAL_LENGTH = 800;
        const PI = Math.PI;
        const PI_2 = Math.PI * 2;
        // Głębokość 3D kształtu — skalowana z viewport
        // Przy rotacji 90° (? → !) tZ staje się grubością "!"
        // Stała=50 → na mobile 3× grubszy proporcjonalnie niż desktop
        // Skalowanie: 50 tuned dla ~600px fontu (desktop 1080p)
        const SHAPE_DEPTH_REF = 50;
        const FONT_REF = 600;
        var shapeDepth = SHAPE_DEPTH_REF; // dynamicznie ustawiane w createParticles
        const VISUAL_SCALE_COMPENSATION = 1.41;

        // ============================================
        // ZMIENNE GLOBALNE
        // ============================================
        const canvas = $id('kinetic-particle-qmark-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, cx, cy;
        let frameCount = 0;
        let initialized = false;
        let lastWidth = 0; // Dla mobile resize optimization

        // ============================================
        // STRUCTURE OF ARRAYS (SoA) - wydajność
        // ============================================
        const maxCapacity = 4000;
        let activeCount = 0;

        // Pozycje bieżące
        const pX = new Float32Array(maxCapacity);
        const pY = new Float32Array(maxCapacity);
        const pZ = new Float32Array(maxCapacity);
        // Pozycje docelowe (kształt "?")
        const tX = new Float32Array(maxCapacity);
        const tY = new Float32Array(maxCapacity);
        const tZ = new Float32Array(maxCapacity);
        // Pozycje startowe (pierścień)
        const sX = new Float32Array(maxCapacity);
        const sY = new Float32Array(maxCapacity);
        const sZ = new Float32Array(maxCapacity);

        // Właściwości cząsteczek
        const pSize = new Float32Array(maxCapacity);
        const pSpeedVar = new Float32Array(maxCapacity);
        const pSeed = new Float32Array(maxCapacity);
        const pCurvePhase = new Float32Array(maxCapacity);
        const pCurveFactor = new Float32Array(maxCapacity);

        // Collapse
        const pTyNorm = new Float32Array(maxCapacity);
        const pFallDriftX = new Float32Array(maxCapacity);
        const pFallDriftZ = new Float32Array(maxCapacity);
        const pFallSpeed = new Float32Array(maxCapacity);

        // Geyser + Emergence B2
        const pScaleBoost = new Float32Array(maxCapacity);   // 1=normal, >1=powiększony na starcie
        const pArcStrength = new Float32Array(maxCapacity);  // siła łukowego lotu fontannowego
        const pFlightSpeed = new Float32Array(maxCapacity);  // 1=normal, >1=szybszy lot

        // Visual
        const pAlpha = new Float32Array(maxCapacity);
        const sortedIndices = new Int16Array(maxCapacity);

        // Kolory Pre-calc (A=niebieski, B=zielony)
        const pR_A = new Uint8Array(maxCapacity);
        const pG_A = new Uint8Array(maxCapacity);
        const pB_A = new Uint8Array(maxCapacity);
        const pR_B = new Uint8Array(maxCapacity);
        const pG_B = new Uint8Array(maxCapacity);
        const pB_B = new Uint8Array(maxCapacity);
        
        // ============ COLOR LUT OPTIMIZATION ============
        // Indeksy par kolorów dla lookup table (eliminuje 120k string allocs/sec)
        const pColorAIdx = new Uint8Array(maxCapacity); // indeks 0-3 w PALETTE_A
        const pColorBIdx = new Uint8Array(maxCapacity); // indeks 0-3 w PALETTE_B
        
        // LUT: 16 pre-computed color strings (4×4 kombinacji)
        // PALETTE_A_RGB/B_RGB definiowane po hexToRgb (patrz HELPERS)
        let PALETTE_A_RGB = null;
        let PALETTE_B_RGB = null;
        const colorLUT = new Array(16);

        // ============ BATCHING BUCKETS ============
        // 16 kolorów × 8 alpha buckets = 128 grup
        // Każdy bucket ma prealokowane tablice na pozycje
        const BUCKET_COUNT = 128;
        const bucketX = [];
        const bucketY = [];
        const bucketS = [];
        const bucketCount = new Uint16Array(BUCKET_COUNT);
        for (var b = 0; b < BUCKET_COUNT; b++) {
            bucketX[b] = new Float32Array(maxCapacity);
            bucketY[b] = new Float32Array(maxCapacity);
            bucketS[b] = new Float32Array(maxCapacity);
        }

        // Stan animacji (sterowany przez pinnedTl)
        const state = {
            formProgress: 0,
            rotateProgress: 0,
            collapseProgress: 0,
            colorMixRatio: 0,
            dotTopY: 0,
            dotBottomY: 0,
            // V8 hidden class optimization: definiuj wszystkie klucze na starcie
            _gigaLeft: false,
            _gigaRight: false,
            _gigaLate: false
        };

        // ============================================
        // HELPERS
        // ============================================
        function hexToRgb(hex) {
            const bigint = parseInt(hex.slice(1), 16);
            return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }
        
        // Parsuj palety po zdefiniowaniu hexToRgb
        PALETTE_A_RGB = PALETTE_A.map(hexToRgb);
        PALETTE_B_RGB = PALETTE_B.map(hexToRgb);

        // SIN LUT: 256 entries, ~0.025 max error = 0.6px przy 24px amplitudzie (subpikselowe)
        // Eliminuje 6000 Math.sin/cos calls per frame w breath animation
        var SIN_LUT_SIZE = 256;
        var SIN_LUT = new Float32Array(SIN_LUT_SIZE);
        var SIN_LUT_SCALE = SIN_LUT_SIZE / (Math.PI * 2);
        for (var _si = 0; _si < SIN_LUT_SIZE; _si++) {
            SIN_LUT[_si] = Math.sin(_si / SIN_LUT_SCALE);
        }
        function fastSin(x) {
            var idx = ((x * SIN_LUT_SCALE) % SIN_LUT_SIZE + SIN_LUT_SIZE) % SIN_LUT_SIZE;
            return SIN_LUT[idx | 0];
        }
        function fastCos(x) {
            return fastSin(x + 1.5708); // π/2
        }

        function globalInsertionSort(indices, count, zValues) {
            for (let i = 1; i < count; i++) {
                const currentIdx = indices[i];
                const currentZ = zValues[currentIdx];
                let j = i - 1;
                while (j >= 0 && zValues[indices[j]] < currentZ) {
                    indices[j + 1] = indices[j];
                    j--;
                }
                indices[j + 1] = currentIdx;
            }
        }

        // ============================================
        // GENEROWANIE KSZTAŁTU "?" z pikseli fontu
        // Upscale: rysuje na większym canvas (min 1200px)
        // → więcej pikseli źródłowych → gęstszy kształt na małych ekranach
        // ============================================
        // Reusable tempCanvas (eliminuje alokację ~13MB GPU per resize)
        let _shapeCanvas = null;
        let _shapeCtx = null;
        
        function getShapeCoordinates() {
            if (!width || width === 0) return [];
            
            // Reuse canvas (unikaj createElement per resize)
            if (!_shapeCanvas) {
                _shapeCanvas = document.createElement('canvas');
                _shapeCtx = _shapeCanvas.getContext('2d');
            }
            const tempCanvas = _shapeCanvas;
            const tCtx = _shapeCtx;

            // Upscale: renderuj na min 1200px dla gęstego samplowania
            const MIN_RENDER = 1200;
            const scaleUp = Math.max(1, MIN_RENDER / Math.min(width, height));
            const rW = Math.round(width * scaleUp);
            const rH = Math.round(height * scaleUp);

            // Mobile portrait: większy mnożnik (0.70) bo min=width jest wąski
            const size = Math.min(rW, rH) * 0.55;
            tempCanvas.width = rW;
            tempCanvas.height = rH;

            // "?" — renderowane jako pytajnik, 3D depth (dome + taper) przekształca wizualnie w "!"
            tCtx.font = '700 ' + size + 'px "Times New Roman", Georgia, serif';
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillStyle = '#000000';
            tCtx.fillText('?', rW / 2, rH / 2);

            // Gap stały = 4px na upscaled canvas (daje spójną gęstość)
            const gap = 4;

            try {
                const imageData = tCtx.getImageData(0, 0, rW, rH).data;
                const points = [];
                for (let y = 0; y < rH; y += gap) {
                    for (let x = 0; x < rW; x += gap) {
                        const index = (y * rW + x) * 4;
                        if (imageData[index + 3] > 128) {
                            // Skaluj z powrotem do screen coordinates
                            points.push({ x: x / scaleUp, y: y / scaleUp });
                        }
                    }
                }

                // Znajdź przerwę między kropką a główną częścią "?"
                // (operujemy na screen coords po skalowaniu)
                const ySet = new Set(points.map(function(p) { return Math.round(p.y); }));
                const ySorted = Array.from(ySet).sort(function(a, b) { return a - b; });

                let maxGap = 0, gapStart = 0, gapEnd = 0;
                for (let i = 1; i < ySorted.length; i++) {
                    const diff = ySorted[i] - ySorted[i - 1];
                    if (diff > maxGap) {
                        maxGap = diff;
                        gapStart = ySorted[i - 1];
                        gapEnd = ySorted[i];
                    }
                }

                // Single-pass min/max (eliminuje 4× map() + Math.max.apply = -60k allocs)
                var minY = Infinity, maxY = -Infinity;
                for (var i = 0; i < points.length; i++) {
                    if (points[i].y < minY) minY = points[i].y;
                    if (points[i].y > maxY) maxY = points[i].y;
                }
                
                // FILTRUJ punkty w przerwie (artefakty fontu między "?" a kropką)
                // Te punkty tworzą "trzy kropki" widoczne na mobile
                var filteredPoints = [];
                for (var i = 0; i < points.length; i++) {
                    var py = points[i].y;
                    // Zachowaj tylko punkty POWYŻEJ przerwy (główna część) lub PONIŻEJ (kropka)
                    if (py <= gapStart || py >= gapEnd) {
                        filteredPoints.push(points[i]);
                    }
                }
                
                // Rozsuń kropkę od reszty (lepszy efekt 3D "!")
                // Shift proporcjonalny do wysokości znaku, nie do wykrytej przerwy
                const charRangeY = (maxY - minY) || 1;
                const shift = maxGap > 3 ? charRangeY * 0.13 : 0;
                if (shift > 0) {
                    for (var i = 0; i < filteredPoints.length; i++) {
                        if (filteredPoints[i].y > gapStart) {
                            filteredPoints[i].y += shift;
                        }
                    }
                }

                // Znajdź finalMaxY po shift (single pass)
                var finalMaxY = -Infinity;
                for (var i = 0; i < filteredPoints.length; i++) {
                    if (filteredPoints[i].y > finalMaxY) finalMaxY = filteredPoints[i].y;
                }
                
                const dotTopAfterShift = gapEnd + shift;
                state.dotTopY = dotTopAfterShift - cy;
                state.dotBottomY = finalMaxY - cy;
                
                // Cleanup: zwolnij GPU memory (canvas.width=0 dealokuje buffer)
                tempCanvas.width = 0;
                tempCanvas.height = 0;

                return filteredPoints;
            } catch (e) {
                // Cleanup nawet przy błędzie
                tempCanvas.width = 0;
                tempCanvas.height = 0;
                return [];
            }
        }

        // ============================================
        // POZYCJA STARTOWA - GEJZER + EMERGENCE B2
        // 49% klasyczny gejzer (z dołu, normalne Z)
        // 50% z przodu kamery (ujemne Z, maleją lecąc w głąb)
        // 1% ogromne kropki tuż przed kamerą (giga)
        // ============================================
        function setInitialPosition(idx, currentIdx, total) {
            var baseZ = 600;
            var roll = Math.random();

            // Wspólny start: z dołu ekranu, rozciągnięty na 160% szerokości
            sY[idx] = height * 0.55 + Math.random() * height * 0.3;
            sX[idx] = (Math.random() - 0.5) * width * 1.6;
            pArcStrength[idx] = 0.35;
            pFlightSpeed[idx] = 1;
            pScaleBoost[idx] = 1;

            // Bias: cząsteczki z prawej zakręcają w lewo i odwrotnie
            var bias = -(sX[idx] / (width * 0.8)) * 0.9;

            if (roll < 0.49) {
                // 49% — klasyczny gejzer (z dołu, normalne Z)
                sZ[idx] = baseZ + (Math.random() - 0.5) * 500;
                pCurveFactor[idx] = (Math.random() - 0.5) * 3 + bias;

            } else if (roll < 0.98) {
                // 49% — z przodu: blisko kamery (ujemne Z)
                sZ[idx] = -200 - Math.random() * 400;
                pCurveFactor[idx] = (Math.random() - 0.5) * 3 + bias;

            } else {
                // 2% — giga cząsteczki (≈40 z 2000 = jak 1% z 4000 w reference)
                pCurveFactor[idx] = (Math.random() - 0.5) * 2;

                if (!state._gigaLeft) {
                    sX[idx] = -(0.15 + Math.random() * 0.1) * width;
                    sY[idx] = height * 0.38 + Math.random() * height * 0.08;
                    sZ[idx] = -650 - Math.random() * 100;
                    pScaleBoost[idx] = 24;
                    pSpeedVar[idx] = 0.35;
                    pFlightSpeed[idx] = 1.15;
                    state._gigaLeft = true;
                } else if (!state._gigaRight) {
                    sX[idx] = (0.15 + Math.random() * 0.1) * width;
                    sY[idx] = height * 0.5 + Math.random() * height * 0.1;
                    sZ[idx] = -500 - Math.random() * 100;
                    pScaleBoost[idx] = 16;
                    pSpeedVar[idx] = 0.28;
                    pFlightSpeed[idx] = 1.2;
                    state._gigaRight = true;
                } else if (!state._gigaLate) {
                    sX[idx] = (0.2 + Math.random() * 0.1) * width;
                    sY[idx] = height * 0.35 + Math.random() * height * 0.08;
                    sZ[idx] = -700 - Math.random() * 80;
                    pScaleBoost[idx] = 36;
                    pSpeedVar[idx] = 0.10;
                    pFlightSpeed[idx] = 1.5;
                    state._gigaLate = true;
                } else {
                    sX[idx] = (Math.random() - 0.5) * width * 0.5;
                    sY[idx] = height * 0.55 + Math.random() * height * 0.3;
                    sZ[idx] = -600 - Math.random() * 150;
                    pScaleBoost[idx] = 4 + Math.random() * 4;
                }
            }
        }

        // ============================================
        // TWORZENIE CZĄSTECZEK
        // ============================================
        function createParticles() {
            state._gigaLeft = false;
            state._gigaRight = false;
            state._gigaLate = false;
            const points = getShapeCoordinates();
            if (points.length === 0) {
                return;
            }
            const maxParticles = width < 768 ? 1000 : 2000;
            const step = Math.ceil(points.length / maxParticles);

            activeCount = 0;

            const selected = [];
            for (let i = 0; i < points.length; i += step) selected.push(points[i]);

            const minY = Math.min.apply(null, selected.map(function(p) { return p.y; }));
            const rangeY = (Math.max.apply(null, selected.map(function(p) { return p.y; })) - minY) || 1;

            // Skaluj głębokość 3D proporcjonalnie do rozmiaru kształtu
            // rangeY ≈ font size w screen coords → na desktop ~594, na mobile ~206
            shapeDepth = SHAPE_DEPTH_REF * (rangeY / FONT_REF);

            for (let i = 0; i < selected.length; i++) {
                if (activeCount >= maxCapacity) break;

                var idx = activeCount;

                // Pozycje docelowe (kształt "?")
                tX[idx] = selected[i].x - cx;
                tY[idx] = selected[i].y - cy;
                tZ[idx] = (Math.random() - 0.5) * shapeDepth;

                // tZ override: szerokość "!" widzianego z boku (theta=π/2)
                // Góra zaokrąglona (dome), laska zwęża się w dół, kropka sferyczna
                var dotStartY = state.dotTopY + cy;
                if (selected[i].y >= dotStartY) {
                    // KROPKA — sferyczna
                    var dotCenterY = (dotStartY + (state.dotBottomY + cy)) * 0.5;
                    var dotR = ((state.dotBottomY + cy) - dotStartY) * 0.5 || 20;
                    var dy = (selected[i].y - dotCenterY) / dotR;
                    var dx = (selected[i].x - cx) / dotR;
                    var distNorm = Math.min(1, Math.sqrt(dx * dx + dy * dy));
                    var sphereFactor = Math.sqrt(Math.max(0, 1 - distNorm * distNorm));
                    tZ[idx] = (Math.random() - 0.5) * shapeDepth * 2.0 * sphereFactor;
                } else {
                    // LASKA — szersza u góry, węższa u dołu, zaokrąglona czapka
                    var staffRange = (dotStartY - minY) || 1;
                    var staffNorm = (selected[i].y - minY) / staffRange;
                    var widthFactor = 2.4 - staffNorm * 1.8;
                    var domeCap = Math.sin(Math.min(1, staffNorm / 0.15) * Math.PI * 0.5);
                    tZ[idx] = (Math.random() - 0.5) * shapeDepth * widthFactor * domeCap;
                }

                // Właściwości statyczne
                pSize[idx] = (Math.random() * 3.5 + 1.5) * VISUAL_SCALE_COMPENSATION;
                pSpeedVar[idx] = Math.random() * 0.5 + 0.5;
                pSeed[idx] = Math.random() * 1000;
                pCurvePhase[idx] = Math.random() * PI_2;

                // Collapse
                pTyNorm[idx] = (selected[i].y - minY) / rangeY;
                pFallDriftX[idx] = (Math.random() - 0.5) * 80;
                pFallDriftZ[idx] = (Math.random() - 0.5) * 60;
                pFallSpeed[idx] = 0.8 + Math.random() * 0.5;

                // Kolory (pre-calc dla wydajności)
                var aIdx = Math.floor(Math.random() * PALETTE_A.length);
                var bIdx = Math.floor(Math.random() * PALETTE_B.length);
                pColorAIdx[idx] = aIdx;
                pColorBIdx[idx] = bIdx;
                // Zachowujemy też raw RGB dla compatibility
                var cA = PALETTE_A_RGB[aIdx];
                var cB = PALETTE_B_RGB[bIdx];
                pR_A[idx] = cA.r; pG_A[idx] = cA.g; pB_A[idx] = cA.b;
                pR_B[idx] = cB.r; pG_B[idx] = cB.g; pB_B[idx] = cB.b;

                sortedIndices[idx] = idx;

                // Pozycja startowa (pierścień)
                setInitialPosition(idx, activeCount, selected.length);
                pX[idx] = sX[idx];
                pY[idx] = sY[idx];
                pZ[idx] = sZ[idx];

                activeCount++;
            }
        }

        // ============================================
        // AKTUALIZACJA FAZ - wywoływana z onUpdate timeline
        // ============================================
        function updatePhases(currentUnit) {

                state.rotateProgress = (currentUnit - ROTATE_START) / (ROTATE_END - ROTATE_START);

                state.collapseProgress = (currentUnit - COLLAPSE_START) / (COLLAPSE_END - COLLAPSE_START);

                state.rotateProgress = 1;

                        // SNAP1 - pozycja zachowana identycznie
                        "31.83%":  { x: "-9vw", y: "-15vh",  scale: 1.35, rotation: 0 },
                        // SNAP2 zone — zdecydowany skurcz (was 0.65 → 0.35)
                        "54.20%":  { x: "-9vw", y: "-15vh",  scale: 0.35, rotation: -85 },
                        "84.00%":  { x: "-9vw", y: "2vh",    scale: 1.00, rotation: -85 },
                        "100%":    { x: "-9vw", y: "5vh",    scale: 1.00, rotation: -85 },
                        easeEach: "sine.inOut"
                    },
                    duration: 25,
                    ease: "none"
                }, I - 2);
                
                // ŚRODKOWY (blob3)
                window.blobTweens.blob3 = pinnedTl.to("#kinetic-blob3", {
                    keyframes: {
                        "0%":      { x: "0.5vw",  y: "46.5vh", scale: 1.00, rotation: -36 },
                        // SNAP1 - pozycja zachowana identycznie
                        "32.16%":  { x: "-1vw",   y: "0.5vh",  scale: 1.10, rotation: -41 },
                        "56.62%":  { x: "-1vw",   y: "0.5vh",  scale: 0.50, rotation: -45 },
                        "83.74%":  { x: "-23vw",  y: "0vh",    scale: 0.95, rotation: 110 },
                        "100%":    { x: "-28vw",  y: "-1vh",   scale: 0.95, rotation: 115 },
                        easeEach: "sine.inOut"
                    },
                    duration: 24.6,
                    ease: "none"
                }, I - 1.6);
            }

            // BLOBY - pozostają widoczne na U:23 (Speed Ramp v3: rozciągnięte)

            // ============================================
            // ANIMACJA TŁA (kinetic-blob-bg-preview)
            // Start: opacity 0
            // Od 6.0: zaczyna się pojawiać
            // Na 9.0: pełna widoczność (duration = 3)
            // Od 16: zaczyna znikać
            // Na 18.5: pełna przezroczystość (duration = 2.5)
            // ============================================
            const blobBgPreviewEl = $id('kinetic-blob-bg-preview');
            
            // Pojawienie się tła
            pinnedTl.to(blobBgPreviewEl, {
                opacity: 1,
                duration: 3,
                ease: "power2.out"
            }, 3.3 + I); // Start od 3.3, kończy na 6.3 (przesunięte -2.7)
            
            // blobBgPreview - pozostaje widoczny na U:23

            // ============================================
            // PARTICLE EXPLOSION — kremowe cząsteczki eksplodujące ze środka
            // Speed Ramp v3: 2-fazowy (BURST linear 2.4U + HANG power2.out 9.6U)
            // Start: 10.80+I, End: 22.80+I (12U total)
            // Junction burst→hang na 13.20+I: 2.4× velocity drop
            // ============================================
            
            let explosionCanvas = null;
            let explosionAnimObj = { progress: 0, scaleProgress: 0, opacity: 0 }; // opacity tracked w JS
            
            const EXPLOSION_COLORS = [
                '#fdeecf',
                '#fff4c9',
                '#f7f4d2',
                '#fff1d3',
                '#f7e7c6'
            ];
            
            function resizeExplosionCanvas() {
                if (IS_TOUCH && freezeFinal) return;
                if (!explosionCanvas) return;
                const dpr = adaptiveDPR.get();
                explosionCanvas.width = window.innerWidth * dpr;
                explosionCanvas.height = window.innerHeight * dpr;
                explosionCanvas._dpr = dpr;
                explosionCanvas._ctx.setTransform(1, 0, 0, 1, 0, 0);
                explosionCanvas._ctx.scale(dpr, dpr);
                // canvas.width= kasuje content — re-render jeśli ticker już nie działa
                if (!explosionRenderActive && explosionCanvas._initialized) {
                    renderExplosion();
                }
            }
            
            function initExplosionCanvas() {
                explosionCanvas = document.createElement('canvas');
                const dpr = adaptiveDPR.get();
                explosionCanvas.width = window.innerWidth * dpr;
                explosionCanvas.height = window.innerHeight * dpr;
                explosionCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:4;mix-blend-mode:luminosity;';
                explosionCanvas._dpr = dpr;
                
                const blobCarrier = $id('kinetic-blob-carrier');
                if (blobCarrier && blobCarrier.parentNode) {
                    blobCarrier.parentNode.insertBefore(explosionCanvas, blobCarrier.nextSibling);
                } else {
                    document.body.appendChild(explosionCanvas);
                }
                
                explosionCanvas._ctx = explosionCanvas.getContext('2d');
                explosionCanvas._ctx.scale(dpr, dpr);
                explosionCanvas._initialized = false;
                
                // Rejestruj callback dla adaptive DPR
                adaptiveDPR.onChange(resizeExplosionCanvas);
                window.addEventListener('resize', resizeExplosionCanvas);
                cleanups.push(() => window.removeEventListener('resize', resizeExplosionCanvas));
                
                return explosionCanvas;
            }
            
            function initExplosionPositions() {
                if (!explosionCanvas || explosionCanvas._initialized) return;
                
                const centerX = window.innerWidth / 2 - window.innerWidth * 0.30;
                const centerY = window.innerHeight * 0.49;
                const gatherWidth = window.innerWidth * 0.7;
                const gatherHeight = 30;
                
                const particles = [];
                const particleCount = 400;
                
                for (let i = 0; i < particleCount; i++) {
                    const colorIndex = Math.floor(Math.random() * EXPLOSION_COLORS.length);
                    const randomValue = Math.pow(Math.random(), 3);
                    const maxScaleFactor = 1 + randomValue * 6;
                    
                    particles.push({
                        // 25% dalszy zasięg: 2.4→3.0, 1.2→1.5
                        scatteredX: (Math.random() * 3.0 - 1.5) * explosionCanvas.width,
                        scatteredY: (Math.random() * 3.0 - 1.5) * explosionCanvas.height,
                        gatheredX: centerX + (Math.random() - 0.5) * gatherWidth,
                        gatheredY: centerY + (Math.random() - 0.5) * gatherHeight,
                        size: 1 + Math.random() * 3,
                        colorIndex: colorIndex, // Dla batch rendering
                        maxScaleFactor: maxScaleFactor
                    });
                }
                
                explosionCanvas._particles = particles;
                explosionCanvas._initialized = true;
            }
            
            function renderExplosion() {
                if (!explosionCanvas || !explosionCanvas._particles) return;
                
                const ctx = explosionCanvas._ctx;
                var progress = explosionAnimObj.progress;
                var scaleProgress = explosionAnimObj.scaleProgress || 0;
                var particles = explosionCanvas._particles;
                
                // clearRect używa logical pixels (po scale)
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                
                // BATCH BY COLOR: 5 fills zamiast 400 (75% mniej canvas API calls)
                // Identyczne piksele na wyjściu
                var PI2 = Math.PI * 2;
                for (var c = 0; c < EXPLOSION_COLORS.length; c++) {
                    ctx.fillStyle = EXPLOSION_COLORS[c];
                    ctx.beginPath();
                    
                    for (var i = 0; i < particles.length; i++) {
                        var p = particles[i];
                        if (p.colorIndex !== c) continue;
                        
                        var currentX = p.gatheredX + (p.scatteredX - p.gatheredX) * progress;
                        var currentY = p.gatheredY + (p.scatteredY - p.gatheredY) * progress;
                        
                        var baseSize = p.size * (0.4 + progress * 0.6);
                        var scaleFactor = 1 + scaleProgress * (p.maxScaleFactor - 1);
                        var currentSize = baseSize * scaleFactor;
                        
                        ctx.moveTo(currentX + currentSize, currentY);
                        ctx.arc(currentX, currentY, currentSize, 0, PI2);
                    }
                    
                    ctx.fill();
                }
            }
            
            let explosionRenderActive = false;
            let explosionTickerFn = null;
            
            function startExplosionRender() {
                if (explosionRenderActive) return;
                explosionRenderActive = true;
                
                explosionTickerFn = function() {
                    if (document.hidden) return;
                    if (!explosionRenderActive) {
                        gsap.ticker.remove(explosionTickerFn);
                        return;
                    }
                    
                    renderExplosion();
                    
                    // AUTO-STOP: gdy animacja zakończona (progress max)
                    // FADEOUT WYŁĄCZONY - cząsteczki pozostają widoczne w końcowej pozycji
                    if (explosionAnimObj.progress >= 0.65) {
                        explosionRenderActive = false;
                        gsap.ticker.remove(explosionTickerFn);
                        return;
                    }
                };
                gsap.ticker.add(explosionTickerFn);
                tickerFns.push(explosionTickerFn);
            }
            
            function stopExplosionRender() {
                explosionRenderActive = false;
                if (explosionTickerFn) {
                    gsap.ticker.remove(explosionTickerFn);
                }
            }
            
            // Init + add to timeline
            initExplosionCanvas();
            cleanups.push(function() {
                if (explosionCanvas && explosionCanvas.parentNode) {
                    explosionCanvas.parentNode.removeChild(explosionCanvas);
                }
                explosionCanvas = null;
            });
            
            const explosionStart = 10.80 + I;
            // Speed Ramp v3: 2-fazowy system (was: 1 tween, explosionDur=8.0)
            const burstDur = 2.4;   // BURST: stała prędkość (linear)
            const hangDur = 9.6;    // HANG: power2.out (kinowy drift)
            // Total: 12.0U, ends: 22.80+I
            
            pinnedTl.set(explosionCanvas, {
                opacity: 0, scale: 1, scaleX: -1, transformOrigin: "center center"
            }, explosionStart);
            
            pinnedTl.add(function() {
                initExplosionPositions();
                startExplosionRender();
            }, explosionStart);
            
            explosionAnimObj.progress = 0;
            explosionAnimObj.scaleProgress = 0;
            
            // === BURST (10.80 → 13.20+I): linear — stała wysoka prędkość 0.175/U ===
            pinnedTl.to(explosionAnimObj, {
                progress: 0.42,
                duration: burstDur,
                ease: "none"
            }, explosionStart);
            
            pinnedTl.to(explosionAnimObj, {
                scaleProgress: 0.42,
                duration: burstDur,
                ease: "none"
            }, explosionStart);
            
            pinnedTl.to(explosionCanvas, {
                scaleX: -1.25,        // zachowuje mirror (minus!)
                scaleY: 1.25,
                duration: burstDur,
                ease: "none"
            }, explosionStart);
            
            // Canvas opacity flash (BEZ ZMIAN)
            pinnedTl.to(explosionCanvas, {
                opacity: 1,
                duration: 0.04,
                ease: "none"
            }, explosionStart + 0.23);
            // Track opacity w JS (eliminuje parseFloat w hot loop)
            pinnedTl.to(explosionAnimObj, {
                opacity: 1,
                duration: 0.04,
                ease: "none"
            }, explosionStart + 0.23);
            
            // === HANG (13.20 → 22.80+I): power2.out — ostry spadek, łagodne wygasanie ===
            pinnedTl.to(explosionAnimObj, {
                progress: 0.65,
                duration: hangDur,
                ease: "power2.out"
            }, explosionStart + burstDur);
            
            pinnedTl.to(explosionCanvas, {
                scaleX: -1.50,        // zachowuje mirror (minus!)
                scaleY: 1.50,
                duration: hangDur,
                ease: "power1.out"
            }, explosionStart + burstDur);
            
            pinnedTl.to(explosionAnimObj, {
                scaleProgress: 0.65,
                duration: hangDur,
                ease: "power2.out"
            }, explosionStart + burstDur);
            
            // FADEOUT WYŁĄCZONY - cząsteczki pozostają widoczne

            // ============================================
            // ANIMACJA SŁOWA "NIGDY" - tekst + blaszka osobno
            // Intro + Expo Tunel spadek (bez powrotu)
            // ============================================
            // Elementy z TEGO SAMEGO kontenera co b3Lines (b3Container)
            // Nie polegamy na window.innerWidth — może dać inną wartość niż CSS media query
            const nigdyPlate = b3Container.querySelector('.nigdy-plate');
            const nigdyText = b3Container.querySelector('.nigdy-text');
            
            // === GLOW - pozycjonowanie pod słowem "nigdy" ===
            const nigdyGlow = $id('kinetic-nigdy-glow');
            const stageEl = container; // was document.querySelector('.stage-pinned') — IS the root
            
            // Reusable positioning function (null-guarded, idempotent)
            const positionNigdyGlow = function() {
                if (IS_TOUCH && freezeFinal) return;
                if (!nigdyText || !nigdyGlow) return;
                const nigdyRect = nigdyText.getBoundingClientRect();
                const stageRect = stageEl.getBoundingClientRect();
                
                // Centrum słowa "nigdy" względem stage
                const glowLeft = (nigdyRect.left + nigdyRect.width / 2) - stageRect.left;
                const glowTop = (nigdyRect.top + nigdyRect.height / 2) - stageRect.top;
                
                // Offset: mobile X=54, Y=-43; desktop X=-160
                const isMobileGlow = window.innerWidth < 600;
                const glowOffsetX = isMobileGlow ? 54 : -160;
                const glowOffsetY = isMobileGlow ? -43 : 0;
                
                nigdyGlow.style.left = (glowLeft + glowOffsetX) + 'px';
                nigdyGlow.style.top = (glowTop + glowOffsetY) + 'px';
            };
            
            requestAnimationFrame(positionNigdyGlow);
            window.addEventListener('resize', positionNigdyGlow);
            cleanups.push(() => window.removeEventListener('resize', positionNigdyGlow));
            
            // === GLOW - ustawienie początkowe (scale: 0, z centrum) ===
            gsap.set(nigdyGlow, { scale: 0, transformOrigin: "center center" });
            
            // Timing - przesunięty o -2.7 (cała animacja skrócona)
            const bgStart = 13.80 + I; // Speed Ramp v3: ORYGINALNA pozycja — 0.6U po junction, vel=36% burst
            const textStart = 15.80 + I; // Speed Ramp v3: ORYGINALNA pozycja — 2.6U po junction, vel=22% burst
            const textDuration = 7.2; // Speed Ramp v3: was 2.5 (2.9× stretch → NIGDY gęstnieje w slow-mo)
            const bgIntroDuration = 9.2; // Speed Ramp v3: was 4.5 (2× stretch → plate wypełnia do snap3)
            const explosionStartGlow = 10.80 + I; // Synchronizacja z eksplozją cząsteczek
            
            // === GLOW INTRO: scale i opacity osobno dla lepszej widoczności ===
            // Opacity: bardzo szybkie pojawienie (25% czasu na pełną widoczność)
            pinnedTl.to(nigdyGlow, {
                opacity: 1,
                duration: bgIntroDuration * 0.25,  // 25% czasu na pełną widoczność
                ease: "power2.out"
            }, explosionStartGlow);
            
            // Scale: wolniejsze rozrastanie (pełny czas)
            pinnedTl.to(nigdyGlow, {
                scale: 1,
                duration: bgIntroDuration,
                ease: "power2.out"
            }, explosionStartGlow);
            
            // === BLASZKA - ustawienie początkowe ===
            gsap.set(nigdyPlate, {
                xPercent: -50,
                yPercent: -50,
                scale: 0.5,
                rotation: 45,
                opacity: 0.3
            });
            
            // === BLASZKA INTRO: opacity 0.3→1, scale 0.5→0.85, rotation 45→-9 ===
            pinnedTl.to(nigdyPlate, {
                opacity: 1,
                scale: 0.85,
                rotation: -9,
                duration: bgIntroDuration,
                ease: "power2.out"
            }, bgStart);
            
            // === TEKST INTRO: fontWeight 300→700, scale 1→1.2 ===
            pinnedTl.to(nigdyText, {
                scale: 1.2,
                fontWeight: 700,
                duration: textDuration,
                ease: "power2.out"
            }, textStart);
            
            // === TEKST INTRO: rotation 0→-5 ===
            pinnedTl.to(nigdyText, {
                rotation: -5,
                duration: textDuration,
                ease: "power2.out"
            }, textStart);
            
            // NIGDY - pozostaje w stanie intro na U:23 (spadki usunięte)

        // koniec main timeline setup

        // ── RELOAD GUARD: Duży desktop resize ──────────────────────────
        // Touch devices (mobile/tablet): NIGDY nie reload (toolbar, klawiatura, rotacja)
        // Desktop: reload przy dużej zmianie W lub H (>15%) → svh/I/snaps stale
        (function() {
            var _initW = window.innerWidth;
            var _initH = window.innerHeight;
            var THRESHOLD = 0.15;
            var _reloadTimer = null;

            var _reloadResizeHandler = function() {
                // Touch devices: wszystkie resize to toolbar/keyboard/rotacja — ignoruj
                if (IS_TOUCH) return;
                
                clearTimeout(_reloadTimer);
                _reloadTimer = setTimeout(function() {
                    var deltaW = Math.abs(window.innerWidth - _initW) / _initW;
                    var deltaH = Math.abs(window.innerHeight - _initH) / _initH;
                    // Desktop: duża zmiana któregokolwiek wymiaru → reinit
                    if (deltaW > THRESHOLD || deltaH > THRESHOLD) {
                        location.reload();
                    }
                }, 500);
            };
            window.addEventListener('resize', _reloadResizeHandler);
            cleanups.push(() => {
                window.removeEventListener('resize', _reloadResizeHandler);
                clearTimeout(_reloadTimer);
            });
        })();


    // ============================================
    // LIFECYCLE: kill / pause / resume (Typ B)
    // ============================================
    let _paused = false;

    function pause() {
        if (_paused) return;
        _paused = true;
        // Odłącz wszystkie ticker functions
        tickerFns.forEach(fn => { if (fn) gsap.ticker.remove(fn); });
        // Pauzuj główny timeline (i ScrollTrigger)
        gsapInstances.forEach(tl => { if (tl && tl.pause) tl.pause(); });
    }

    function resume() {
        if (!_paused) return;
        _paused = false;
        // Podłącz ticker functions
        tickerFns.forEach(fn => { if (fn) gsap.ticker.add(fn); });
        // Wznów timeline
        gsapInstances.forEach(tl => { if (tl && tl.resume) tl.resume(); });
    }

    function kill() {
        pause();
        // 1. Wykonaj wszystkie cleanups (removeEventListener, clearTimeout)
        cleanups.forEach(fn => { try { fn(); } catch(e) {} });
        cleanups.length = 0;
        // 2. Kill GSAP instances (pinnedTl + ScrollTrigger + child tweens)
        gsapInstances.forEach(tl => {
            if (tl && tl.scrollTrigger) tl.scrollTrigger.kill();
            if (tl && tl.kill) tl.kill();
        });
        gsapInstances.length = 0;
        // 3. Wyczyść ticker references
        tickerFns.length = 0;
        // 4. Wyczyść timer IDs
        timerIds.forEach(id => clearInterval(id));
        timerIds.length = 0;
        // 5. Wyczyść window references
        window.pinnedTl = null;
        window.cylinder = null;
        window.particleQmark = null;
        window.BRIDGE_I = null;
        window.blobTweens = null;
        // 6. Przywróć globalny fps
        if (_prevFps != null) gsap.ticker.fps(_prevFps);
        // 7. Reset freeze/lock flags
        freezeFinal = false;
        mobileResizeLock = false;
        clearTimeout(mobileResizeTimer);
    }

    return { kill, pause, resume };

    } // END init()

    // ============================================
    // AUTO-INIT — czeka na load (fonty + zasoby)
    // ============================================
    window.addEventListener('load', function() {
        const el = document.getElementById('kinetic-section');
        if (!el) return;

        // Podwójna ochrona: element-level + window-level
        el.__kineticInstance?.kill?.();
        window.kineticSection?.kill?.();

        const inst = init(el);
        el.__kineticInstance = inst;
        window.kineticSection = inst;
    });
    </script>
</body>
